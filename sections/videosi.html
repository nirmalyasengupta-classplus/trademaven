<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trade Maven – Videos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --green:#00e5a0; --bg:#000; --text:#fff; --muted:rgba(255,255,255,0.5); }
  html, body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

  /* ══════════════════════════
     FULLSCREEN MODAL
  ══════════════════════════ */
  #modal-overlay {
    position:fixed; inset:0; z-index:99999;
    background:rgba(0,0,0,0);
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
    transition:background .35s ease;
  }
  #modal-overlay.open {
    pointer-events:all;
    background:rgba(0,0,0,0.92);
  }

  #modal-box {
    position:relative;
    width:90vw; max-width:1100px;
    aspect-ratio:16/9;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,229,160,0.2), 0 40px 120px rgba(0,0,0,0.9), 0 0 80px rgba(0,229,160,0.15);
    transform:scale(0.5) translateY(40px);
    opacity:0;
    transition:transform .45s cubic-bezier(.22,1,.36,1), opacity .35s ease;
  }
  #modal-overlay.open #modal-box {
    transform:scale(1) translateY(0);
    opacity:1;
  }

  #modal-box iframe {
    width:100%; height:100%;
    border:none; display:block;
  }

  /* Close button */
  #modal-close {
    position:fixed;
    top:20px; right:24px;
    width:44px; height:44px;
    border-radius:50%;
    background:rgba(0,0,0,0.7);
    border:1px solid rgba(0,229,160,0.3);
    color:var(--green);
    font-size:20px; line-height:44px; text-align:center;
    cursor:pointer; z-index:100000;
    opacity:0; pointer-events:none;
    transition:opacity .25s, background .2s, transform .2s;
  }
  #modal-overlay.open #modal-close {
    opacity:1; pointer-events:all;
  }
  #modal-close:hover {
    background:rgba(0,229,160,0.15);
    transform:scale(1.1) rotate(90deg);
  }

  /* Shimmer top edge on modal */
  #modal-shimmer {
    position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--green),transparent);
    z-index:2;
  }

  /* ══════════════════════════
     SECTION
  ══════════════════════════ */
  .videos-section {
    position:relative; padding:88px 0 96px; overflow:hidden;
  }
  .videos-section::before, .videos-section::after {
    content:''; position:absolute; left:5%; right:5%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,229,160,0.2),transparent); z-index:1;
  }
  .videos-section::before { top:0; }
  .videos-section::after  { bottom:0; }

  .bg-glow {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:1100px; height:700px;
    background:radial-gradient(ellipse,rgba(0,229,160,0.08) 0%,transparent 65%);
    pointer-events:none; z-index:0;
  }
  .fade-mask { position:absolute; top:0; bottom:0; width:220px; z-index:10; pointer-events:none; }
  .fade-mask.left  { left:0;  background:linear-gradient(to right,#000 30%,transparent); }
  .fade-mask.right { right:0; background:linear-gradient(to left,#000 30%,transparent); }

  /* ── HEADING ── */
  .videos-heading {
    position:relative; z-index:5;
    text-align:center; padding:0 5%; margin-bottom:60px;
    opacity:0; transform:translateY(20px);
    transition:opacity .6s, transform .6s;
  }
  .videos-heading.visible { opacity:1; transform:translateY(0); }

  .eyebrow {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.22);
    border-radius:100px; padding:5px 16px; margin-bottom:16px;
    font-size:11px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:var(--green);
  }
  .eyebrow .dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse-dot 2s ease-in-out infinite; }
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,4.5vw,58px); line-height:1.05; letter-spacing:1px; color:#fff; }
  .section-title .accent { color:var(--green); }
  .section-desc { font-size:15px; color:var(--muted); margin-top:12px; max-width:480px; margin-left:auto; margin-right:auto; line-height:1.7; }

  /* ── STAGE ── */
  .stage { position:relative; z-index:2; perspective:1400px; perspective-origin:50% 35%; }
  .rows-wrap {
    transform:rotateX(10deg); transform-origin:center top;
    display:flex; flex-direction:column; gap:20px; padding:4px 0 40px;
    transition:transform .6s cubic-bezier(.4,0,.2,1);
  }
  .stage:hover .rows-wrap { transform:rotateX(4deg); }

  .marquee-row { display:flex; gap:20px; width:max-content; will-change:transform; }
  .row-1 { animation:go-left  34s linear infinite; }
  .row-2 { animation:go-right 42s linear infinite; }
  .stage:hover .marquee-row { animation-play-state:paused !important; }

  /* ── VIDEO CARD ── */
  .vcard {
    position:relative; width:310px; border-radius:16px;
    overflow:visible; flex-shrink:0; cursor:pointer;
    transform-style:preserve-3d; will-change:transform;
    transition:transform .5s cubic-bezier(.4,0,.2,1);
  }
  .vcard-inner {
    position:relative; border-radius:16px; overflow:hidden;
    background:#090f0b; border:1px solid rgba(0,229,160,0.1);
    transition:border-color .2s, box-shadow .2s;
  }
  .vcard:hover .vcard-inner {
    border-color:rgba(0,229,160,0.5);
    box-shadow:0 0 0 1px rgba(0,229,160,0.08), 0 20px 50px rgba(0,0,0,0.7), 0 0 40px rgba(0,229,160,0.22), 0 0 80px rgba(0,229,160,0.10);
  }
  .vcard-shimmer {
    position:absolute; top:0; left:5%; right:5%; height:1.5px;
    background:linear-gradient(90deg,transparent,var(--green),transparent);
    opacity:0; z-index:6; transition:opacity .25s; border-radius:0 0 4px 4px;
  }
  .vcard:hover .vcard-shimmer { opacity:1; }
  .vcard-spotlight {
    position:absolute; inset:0; border-radius:16px;
    pointer-events:none; z-index:1; opacity:0; transition:opacity .2s;
  }
  .vcard:hover .vcard-spotlight { opacity:1; }
  .vcard-bloom {
    position:absolute; inset:-20px; border-radius:24px;
    pointer-events:none; z-index:-1; opacity:0;
    background:radial-gradient(ellipse at 50% 50%,rgba(0,229,160,0.18) 0%,transparent 65%);
    transition:opacity .3s; filter:blur(12px);
  }
  .vcard:hover .vcard-bloom { opacity:1; }

  .vcard-thumb { position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; background:#050f08; }
  .vcard-thumb img { width:100%; height:100%; display:block; object-fit:cover; transition:transform .5s ease; }
  .vcard:hover .vcard-thumb img { transform:scale(1.07); }
  .vcard-thumb::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(to bottom,transparent 35%,rgba(0,0,0,0.55) 100%);
    pointer-events:none; z-index:1;
  }

  .play-btn {
    position:absolute; inset:0; z-index:3;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .25s;
  }
  .vcard:hover .play-btn { opacity:1; }
  .play-ring {
    width:52px; height:52px; border-radius:50%;
    border:2px solid rgba(0,229,160,0.5);
    display:flex; align-items:center; justify-content:center;
    position:relative; animation:ring-pulse 1.8s ease-in-out infinite;
  }
  .play-ring::before {
    content:''; position:absolute; inset:-8px; border-radius:50%;
    border:1px solid rgba(0,229,160,0.2); animation:ring-pulse 1.8s ease-in-out infinite .3s;
  }
  .play-fill {
    width:40px; height:40px; border-radius:50%; background:var(--green);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 20px rgba(0,229,160,0.7);
  }
  .play-fill svg { width:16px; height:16px; margin-left:3px; }

  .vcard-dur {
    position:absolute; bottom:8px; right:8px; z-index:4;
    background:rgba(0,0,0,0.78); color:#fff; font-size:11px; font-weight:600;
    padding:2px 7px; border-radius:4px; font-family:'Rajdhani',sans-serif; letter-spacing:.5px;
  }
  .vcard-views {
    position:absolute; top:8px; left:8px; z-index:4;
    background:rgba(0,229,160,0.12); border:1px solid rgba(0,229,160,0.32);
    color:var(--green); font-size:10px; font-weight:700;
    padding:2px 8px; border-radius:100px; font-family:'Rajdhani',sans-serif; letter-spacing:.5px;
  }

  .vcard-info { padding:14px 16px 17px; position:relative; z-index:2; }
  .vcard-title {
    font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:700; color:#fff;
    line-height:1.35; margin-bottom:6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    transition:color .2s;
  }
  .vcard:hover .vcard-title { color:var(--green); }
  .vcard-meta { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); font-family:'Rajdhani',sans-serif; font-weight:600; }
  .vcard-meta .dot2 { width:3px; height:3px; background:var(--muted); border-radius:50%; }

  /* ── CTA ── */
  .strip-cta {
    position:relative; z-index:5; text-align:center; margin-top:52px; padding:0 5%;
    opacity:0; transform:translateY(16px); transition:opacity .6s .3s, transform .6s .3s;
  }
  .strip-cta.visible { opacity:1; transform:translateY(0); }
  .btn-yt {
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid rgba(255,255,255,0.15); color:var(--text);
    padding:13px 30px; border-radius:8px;
    font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:700; letter-spacing:.5px;
    text-decoration:none; transition:all .25s;
  }
  .btn-yt:hover { border-color:var(--green); color:var(--green); box-shadow:0 0 28px rgba(0,229,160,0.18); transform:translateY(-2px); }
  .btn-yt svg { width:18px; height:18px; }
  .cta-sub { font-size:13px; color:var(--muted); margin-top:14px; }

  @keyframes go-left  { from{transform:translateX(0)}    to{transform:translateX(-50%)} }
  @keyframes go-right { from{transform:translateX(-50%)} to{transform:translateX(0)} }
  @keyframes pulse-dot { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,160,.5)} 50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,229,160,0)} }
  @keyframes ring-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:.5} }

  @media(max-width:600px){
    .rows-wrap,.stage:hover .rows-wrap { transform:none; }
    .vcard { width:250px; }
    .fade-mask { width:60px; }
    #modal-box { width:96vw; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════
     FULLSCREEN MODAL
══════════════════════════ -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-shimmer"></div>
    <iframe id="modal-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>
<div id="modal-close" onclick="closeModal()">✕</div>

<!-- ══════════════════════════
     SECTION
══════════════════════════ -->
<section class="videos-section">
  <div class="bg-glow"></div>
  <div class="fade-mask left"></div>
  <div class="fade-mask right"></div>

  <div class="videos-heading" id="vidHeading">
    <div class="eyebrow"><span class="dot"></span> Watch &amp; Learn</div>
    <h2 class="section-title">Free <span class="accent">Market Insights</span> — Every Week</h2>
    <p class="section-desc">Trade Maven breaks down live trades, chart patterns, and market psychology. All free. All actionable.</p>
  </div>

  <div class="stage" id="stage">
    <div class="rows-wrap">
      <div class="marquee-row row-1" id="row1"></div>
      <div class="marquee-row row-2" id="row2"></div>
    </div>
  </div>

  <div class="strip-cta" id="stripCta">
    <a href="https://www.youtube.com/@itrademaven" target="_blank" class="btn-yt">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 00-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6a3 3 0 00-2.1 2.1C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 002.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 002.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
      View All Videos on YouTube
    </a>
    <p class="cta-sub">131K+ monthly views · New content every week</p>
  </div>
</section>

<script>
/* ══════════════════════════
   MODAL
══════════════════════════ */
const overlay = document.getElementById('modal-overlay');
const iframe  = document.getElementById('modal-iframe');

function openModal(videoId) {
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&color=white`;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  /* Stop video immediately */
  setTimeout(()=>{ iframe.src=''; }, 380);
  document.body.style.overflow = '';
}

/* Close on backdrop click */
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });

/* Close on Escape */
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ══════════════════════════
   VIDEO DATA — 11 unique videos
══════════════════════════ */
const videos = [
  { id:'zuiDM2J1MUY', title:'Live Trade Analysis — Full Breakdown with MMC Method',             dur:'Live' },
  { id:'xviwdPXK1Fw', title:'Smart Money Concepts Live Session — Trade Maven',                  dur:'Live' },
  { id:'C1RO6btLcyo', title:'Candlestick Patterns That Actually Work',                          dur:''     },
  { id:'BleaA88Ix8w', title:'ICT Concepts Explained — Killzones & Dealing Range',               dur:''     },
  { id:'7J9YwQsFdMo', title:'Price Action Strategy — Full Chart Walkthrough',                   dur:''     },
  { id:'axpuvDbYItU', title:'Gold (XAUUSD) Trade Setup — Live Analysis',                        dur:'Live' },
  { id:'tW566378OxI', title:'Advanced SMC — Order Blocks, FVG & Liquidity Explained',           dur:''     },
  { id:'8CTxZfX70Iw', title:'Live Market Breakdown — Trade Maven Analysis Session',             dur:'Live' },
  { id:'N0b1Y71Bmfc', title:'MMC Method Live — Full Trade Setup Explained',                     dur:'Live' },
  { id:'pM4cpyWL1y0', title:'Price Action Masterclass — Entry & Exit Strategies',               dur:''     },
  { id:'0a4kutN0Znw', title:'Smart Money Concepts — Live Chart Analysis',                       dur:'Live' },
];

/* ══════════════════════════
   BUILD CARD
══════════════════════════ */
function makeCard(v) {
  const card = document.createElement('div');
  card.className = 'vcard';

  card.innerHTML = `
    <div class="vcard-bloom"></div>
    <div class="vcard-shimmer"></div>
    <div class="vcard-inner">
      <div class="vcard-spotlight"></div>
      <div class="vcard-thumb">
        <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg"
             alt="${v.title}" loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${v.id}/hqdefault.jpg'"/>
        <div class="play-btn">
          <div class="play-ring">
            <div class="play-fill">
              <svg viewBox="0 0 16 16" fill="#000"><path d="M4 2l10 6-10 6V2z"/></svg>
            </div>
          </div>
        </div>
        ${v.dur ? `<div class="vcard-dur">${v.dur}</div>` : ''}
      </div>
      <div class="vcard-info">
        <div class="vcard-title">${v.title}</div>
        <div class="vcard-meta">
          <span>Trade Maven</span>
          <span class="dot2"></span>
          <span>Click to watch</span>
        </div>
      </div>
    </div>
  `;

  /* Open modal on click */
  card.addEventListener('click', () => openModal(v.id));

  /* 3D tilt + spotlight */
  const spotlight = card.querySelector('.vcard-spotlight');
  const bloom     = card.querySelector('.vcard-bloom');

  card.addEventListener('mouseenter', () => { card.style.transition='transform 0.08s linear'; });
  card.addEventListener('mousemove', e => {
    const r  = card.getBoundingClientRect();
    const mx = e.clientX-r.left, my = e.clientY-r.top;
    const rx = -((my-r.height/2)/(r.height/2))*14;
    const ry =  ((mx-r.width/2) /(r.width/2)) *14;
    card.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.04,1.04,1.04) translateZ(10px)`;
    spotlight.style.background = `radial-gradient(420px circle at ${(mx/r.width)*100}% ${(my/r.height)*100}%, rgba(0,229,160,0.18), transparent 60%)`;
    bloom.style.background     = `radial-gradient(ellipse at ${50-ry*2}% ${50+rx*2}%, rgba(0,229,160,0.22) 0%, transparent 65%)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transition = 'transform 0.55s cubic-bezier(.4,0,.2,1)';
    card.style.transform  = '';
    spotlight.style.background = '';
    bloom.style.background     = '';
  });

  return card;
}

/* ══════════════════════════
   FILL ROWS
   Row 1: first 6 videos (doubled for seamless loop)
   Row 2: last 5 videos reversed (doubled)
══════════════════════════ */
function fillRow(rowEl, subset) {
  /* double for seamless infinite scroll */
  [...subset, ...subset].forEach(v => rowEl.appendChild(makeCard(v)));
}

fillRow(document.getElementById('row1'), videos.slice(0, 6));
fillRow(document.getElementById('row2'), [...videos.slice(6)].reverse());

/* ══════════════════════════
   SCROLL REVEAL
══════════════════════════ */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }});
}, { threshold:0.15 });
obs.observe(document.getElementById('vidHeading'));
obs.observe(document.getElementById('stripCta'));
</script>
</body>
</html>
